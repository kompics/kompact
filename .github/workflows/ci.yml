name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
    types: [opened, reopened, synchronize]
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

env:
  PINNED_NIGHTLY_TOOLCHAIN: nightly-2026-04-11

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        rust: [stable, nightly, "1.94.1"] # MSRV
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4
      - name: Setup rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.rust }}
      - name: Cache cargo state
        uses: Swatinem/rust-cache@v2
      # Keep the local and net examples out of the shared workspace runs:
      # Cargo feature unification would otherwise compile the local examples
      # with `distributed` enabled via `kompact-net`, which defeats the point
      # of testing the local-only default configuration separately.
      - name: Run workspace tests
        run: cargo test --workspace --exclude kompact-examples-local --exclude kompact-examples-net --exclude macro-test --verbose
      - name: Run ignored workspace tests
        run: cargo test --workspace --exclude kompact-examples-local --exclude kompact-examples-net --exclude macro-test --verbose -- --ignored
      - name: Run macro-test
        run: cargo test -p macro-test --verbose
      - name: Run ignored macro-test cases
        run: cargo test -p macro-test --verbose -- --ignored
      - name: Run local examples tests
        run: cargo test -p kompact-examples-local --verbose
      - name: Run ignored local examples tests
        run: cargo test -p kompact-examples-local --verbose -- --ignored
      - name: Run net examples tests
        run: cargo test -p kompact-examples-net --verbose
      - name: Run ignored net examples tests
        run: cargo test -p kompact-examples-net --verbose -- --ignored

  test-core-distributed-serde-features:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        rust: [stable, nightly, "1.94.1"] # MSRV
        feature: [ser_id_8, ser_id_16, ser_id_32]
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4
      - name: Setup rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.rust }}
      - name: Cache cargo state
        uses: Swatinem/rust-cache@v2
      - name: Run tests
        run: cargo test --manifest-path=core/Cargo.toml --no-default-features --features distributed,serde_support,${{ matrix.feature }}
      - name: Run ignored tests
        run: cargo test --manifest-path=core/Cargo.toml --no-default-features --features distributed,serde_support,${{ matrix.feature }} -- --ignored

  test-core-misc-features:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        rust: [stable, nightly, "1.94.1"] # MSRV
        feature: [thread_pinning, low_latency, type_erasure]
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4
      - name: Setup rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.rust }}
      - name: Cache cargo state
        uses: Swatinem/rust-cache@v2
      - name: Run tests
        run: cargo test --manifest-path=core/Cargo.toml --features ${{ matrix.feature }}
      - name: Run ignored tests
        run: cargo test --manifest-path=core/Cargo.toml --features ${{ matrix.feature }} -- --ignored

  clippy:
    name: cargo clippy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4
      - name: Install nightly toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.PINNED_NIGHTLY_TOOLCHAIN }}
          components: clippy, rustfmt
      - name: Cache cargo state
        uses: Swatinem/rust-cache@v2
      # As above for tests: lint the workspace core separately so the local
      # examples are checked under plain default `kompact`, not under a
      # feature-unified graph that pulled in `distributed` through `kompact-net`.
      # Keep `dynamic-benches` out of the shared pass as well: its bench targets
      # intentionally exercise three different feature graphs (local,
      # distributed, network), which a single workspace invocation would unify.
      - name: Run cargo clippy (workspace)
        run: cargo clippy --workspace --exclude dynamic-benches --exclude kompact-examples-local --exclude kompact-examples-net --exclude macro-test --all-targets -- -D warnings
      - name: Run cargo clippy (dynamic benches, local)
        run: cargo clippy -p dynamic-benches --all-targets -- -D warnings
      - name: Run cargo clippy (dynamic benches, distributed)
        run: cargo clippy -p dynamic-benches --all-targets --features bench-distributed -- -D warnings
      - name: Run cargo clippy (dynamic benches, network)
        run: cargo clippy -p dynamic-benches --all-targets --features bench-network -- -D warnings
      - name: Run cargo clippy (macro-test)
        run: cargo clippy -p macro-test --all-targets -- -D warnings
      - name: Run cargo clippy (local examples)
        run: cargo clippy -p kompact-examples-local --all-targets -- -D warnings
      - name: Run cargo clippy (net examples)
        run: cargo clippy -p kompact-examples-net --all-targets -- -D warnings
      - name: Run cargo clippy (ser_id_8)
        run: cargo clippy --manifest-path=core/Cargo.toml --all-targets --no-default-features --features distributed,serde_support,ser_id_8 -- -D warnings
      - name: Run cargo clippy (thread_pinning)
        run: cargo clippy --manifest-path=core/Cargo.toml --all-targets --features thread_pinning -- -D warnings
      - name: Run cargo clippy (low_latency)
        run: cargo clippy --manifest-path=core/Cargo.toml --all-targets --features low_latency -- -D warnings
      - name: Run cargo clippy (type_erasure)
        run: cargo clippy --manifest-path=core/Cargo.toml --all-targets --features type_erasure -- -D warnings

  format:
    name: cargo fmt
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4
      - name: Install nightly toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.PINNED_NIGHTLY_TOOLCHAIN }}
          components: rustfmt
      - name: Cache cargo state
        uses: Swatinem/rust-cache@v2
      - name: Run cargo fmt
        run: cargo fmt --all -- --check
