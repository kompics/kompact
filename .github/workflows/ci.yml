name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
    types: [opened, reopened, synchronize]
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

env:
  MSRV_TOOLCHAIN: "1.94.1"
  PINNED_NIGHTLY_TOOLCHAIN: nightly-2026-04-11

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        rust: [stable, nightly, "${{ env.MSRV_TOOLCHAIN }}"]
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4
      - name: Setup rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.rust }}
      - name: Cache cargo state
        uses: Swatinem/rust-cache@v2
      - name: Run tests
        run: cargo test --verbose
      - name: Run ignored tests
        run: cargo test --verbose -- --ignored

  test-core-serde-features:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        rust: [stable, nightly, "${{ env.MSRV_TOOLCHAIN }}"]
        feature: [ser_id_8, ser_id_16, ser_id_32]
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4
      - name: Setup rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.rust }}
      - name: Cache cargo state
        uses: Swatinem/rust-cache@v2
      - name: Run tests
        run: cargo test --manifest-path=core/Cargo.toml --no-default-features --features ${{ matrix.feature }}
      - name: Run ignored tests
        run: cargo test --manifest-path=core/Cargo.toml --no-default-features --features ${{ matrix.feature }} -- --ignored

  test-core-misc-features:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        rust: [stable, nightly, "${{ env.MSRV_TOOLCHAIN }}"]
        feature: [thread_pinning, low_latency, type_erasure]
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4
      - name: Setup rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.rust }}
      - name: Cache cargo state
        uses: Swatinem/rust-cache@v2
      - name: Run tests
        run: cargo test --manifest-path=core/Cargo.toml --features ${{ matrix.feature }}
      - name: Run ignored tests
        run: cargo test --manifest-path=core/Cargo.toml --features ${{ matrix.feature }} -- --ignored

  clippy:
    name: cargo clippy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4
      - name: Install nightly toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.PINNED_NIGHTLY_TOOLCHAIN }}
          components: clippy, rustfmt
      - name: Cache cargo state
        uses: Swatinem/rust-cache@v2
      - name: Run cargo clippy (default)
        run: cargo clippy --all-targets -- -D warnings
      - name: Run cargo clippy (ser_id_8)
        run: cargo clippy --manifest-path=core/Cargo.toml --all-targets --no-default-features --features ser_id_8 -- -D warnings
      - name: Run cargo clippy (thread_pinning)
        run: cargo clippy --manifest-path=core/Cargo.toml --all-targets --features thread_pinning -- -D warnings
      - name: Run cargo clippy (low_latency)
        run: cargo clippy --manifest-path=core/Cargo.toml --all-targets --features low_latency -- -D warnings
      - name: Run cargo clippy (type_erasure)
        run: cargo clippy --manifest-path=core/Cargo.toml --all-targets --features type_erasure -- -D warnings

  format:
    name: cargo fmt
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4
      - name: Install nightly toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.PINNED_NIGHTLY_TOOLCHAIN }}
          components: rustfmt
      - name: Cache cargo state
        uses: Swatinem/rust-cache@v2
      - name: Run cargo fmt
        run: cargo fmt --all -- --check
